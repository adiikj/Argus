# Local dev infra. Ports bind to 127.0.0.1 only.
# Prod (§16) must not publish datastore ports — only dashboard + API via the tunnel.
name: argus

services:
  kafka:
    # 3.9.0 has KAFKA-18281: KRaft startup fails validating the controller
    # listener's bind address as if it were advertised. Fixed in 3.9.1.
    image: apache/kafka:3.9.1
    container_name: argus-kafka
    ports:
      - '127.0.0.1:9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      # INTERNAL = containers (kafka:19092), EXTERNAL = host (localhost:9092)
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: argus-elasticsearch
    ports:
      - '127.0.0.1:9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
      bootstrap.memory_lock: 'true'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -fs http://localhost:9200/_cluster/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    ports:
      # host-side port overridable (POSTGRES_HOST_PORT) for machines where
      # 5432 is already taken by a native install; container port never changes.
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argus -d argus']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # optional — only used if REDIS_URL is set (see .env.example). The window
  # store + internal bus both fall back to in-process state without it.
  redis:
    image: redis:7-alpine
    container_name: argus-redis
    ports:
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  kafka_data:
  es_data:
  pg_data:
